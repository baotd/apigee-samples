openapi: 3.0.0
info:
  title: Shipping and Label API
  description: API to calculate rates and create shipping labels for Cymbal Retail.
  version: 1.0.0
servers:
  - url: https://APIGEE_HOST/v1/samples/adk-cymbal-retail/shipping
paths:
  /:
    post:
      summary: Create a shipping label and get rates
      operationId: createShippingLabel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                shippingLabelRequest:
                  type: object
                  properties:
                    recipientName:
                      type: string
                    address:
                      type: string
                    weight:
                      type: number
      responses:
        '200':
          description: Shipping label response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  shippingLabelResponse:
                    type: object
                    properties:
                      confirmationId:
                        type: string
                      shippingLabelStatus:
                        type: string
                      shippingProvider:
                        type: string
                      shippingDetails:
                        type: object
                        properties:
                          type:
                            type: string
                          cost:
                            type: string
                          currency:
                            type: string
                          ETA:
                            type: string
